<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowData Leads | CRM de Prospecção</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="topo">
  <div>
    <h1>FlowData Leads</h1>
    <p>CRM inteligente para mapear, avaliar e prospectar clientes com presença digital fraca.</p>
  </div>
</header>

<main class="container">

  <section class="cards">
    <div class="card">
      <h3>Total de Leads</h3>
      <span id="totalLeads">0</span>
    </div>

    <div class="card alto">
      <h3>Potencial Alto</h3>
      <span id="potencialAlto">0</span>
    </div>

    <div class="card medio">
      <h3>Potencial Médio</h3>
      <span id="potencialMedio">0</span>
    </div>

    <div class="card baixo">
      <h3>Potencial Baixo</h3>
      <span id="potencialBaixo">0</span>
    </div>

    <div class="card dinheiro">
      <h3>Valor Potencial</h3>
      <span id="valorPotencial">R$ 0</span>
    </div>
  </section>

  <section class="formulario">
    <h2>Cadastrar Lead</h2>

    <form id="leadForm">

      <input type="text" id="empresa" placeholder="Nome da empresa" required />
      <input type="text" id="cidade" placeholder="Cidade" required />

      <select id="nicho" required>
        <option value="">Selecione o nicho</option>
        <option value="Clínica Odontológica">Clínica Odontológica</option>
        <option value="Fisioterapia">Fisioterapia</option>
        <option value="Clínica de Estética">Clínica de Estética</option>
        <option value="Imobiliária">Imobiliária</option>
        <option value="Distribuidora">Distribuidora</option>
        <option value="Agropecuária">Agropecuária</option>
        <option value="Outro">Outro</option>
      </select>

      <input type="text" id="telefone" placeholder="WhatsApp / telefone" />
      <input type="url" id="site" placeholder="Site da empresa" />
      <input type="url" id="instagram" placeholder="Instagram" />
      <input type="url" id="googleMaps" placeholder="Link do Google Maps" />

      <select id="origem">
        <option value="Google Maps">Google Maps</option>
        <option value="Instagram">Instagram</option>
        <option value="Facebook">Facebook</option>
        <option value="LinkedIn">LinkedIn</option>
        <option value="Indicação">Indicação</option>
        <option value="Pesquisa manual">Pesquisa manual</option>
      </select>

      <select id="status">
        <option value="Lead Novo">Lead Novo</option>
        <option value="Primeiro Contato">Primeiro Contato</option>
        <option value="Interessado">Interessado</option>
        <option value="Reunião">Reunião</option>
        <option value="Proposta">Proposta</option>
        <option value="Fechado">Fechado</option>
        <option value="Perdido">Perdido</option>
      </select>

      <select id="servico">
        <option value="Landing Page">Landing Page</option>
        <option value="Site Institucional">Site Institucional</option>
        <option value="Google Business">Google Business</option>
        <option value="Plano Mensal">Plano Mensal</option>
        <option value="Consultoria Digital">Consultoria Digital</option>
        <option value="Landing Page + Google Business">Landing Page + Google Business</option>
      </select>

      <input type="text" id="valor" placeholder="Valor sugerido. Ex: R$ 497" />

      <input type="date" id="proximoContato" />

      <div class="checklist">
        <label><input type="checkbox" id="temSite" /> Tem site profissional</label>
        <label><input type="checkbox" id="temWhatsapp" /> WhatsApp visível</label>
        <label><input type="checkbox" id="instagramAtivo" /> Instagram ativo</label>
        <label><input type="checkbox" id="googleAtualizado" /> Google atualizado</label>
        <label><input type="checkbox" id="identidadeVisual" /> Boa identidade visual</label>
      </div>

      <textarea id="problemas" placeholder="Problemas encontrados: sem site, Google desatualizado, Instagram parado..."></textarea>

      <textarea id="observacoes" placeholder="Observações internas sobre o lead"></textarea>

      <button type="submit">Salvar Lead</button>
    </form>
  </section>

  <section class="filtros">
    <h2>Filtrar Leads</h2>

    <input type="text" id="filtroCidade" placeholder="Filtrar por cidade" />

    <select id="filtroNicho">
      <option value="">Todos os nichos</option>
      <option value="Clínica Odontológica">Clínica Odontológica</option>
      <option value="Fisioterapia">Fisioterapia</option>
      <option value="Clínica de Estética">Clínica de Estética</option>
      <option value="Imobiliária">Imobiliária</option>
      <option value="Distribuidora">Distribuidora</option>
      <option value="Agropecuária">Agropecuária</option>
      <option value="Outro">Outro</option>
    </select>

    <select id="filtroStatus">
      <option value="">Todos os status</option>
      <option value="Lead Novo">Lead Novo</option>
      <option value="Primeiro Contato">Primeiro Contato</option>
      <option value="Interessado">Interessado</option>
      <option value="Reunião">Reunião</option>
      <option value="Proposta">Proposta</option>
      <option value="Fechado">Fechado</option>
      <option value="Perdido">Perdido</option>
    </select>

    <select id="filtroPotencial">
      <option value="">Todos os potenciais</option>
      <option value="Alto">Alto</option>
      <option value="Médio">Médio</option>
      <option value="Baixo">Baixo</option>
    </select>
  </section>

  <section class="lista">
    <h2>Leads Cadastrados</h2>
    <div id="listaLeads"></div>
  </section>

</main>

<script src="script.js"></script>
</body>
</html>
