<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowData Leads</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="topo">
  <h1>FlowData Leads</h1>
  <p>CRM inteligente para mapear, avaliar e prospectar clientes.</p>
</header>

<main class="container">

  <section class="cards">
    <div class="card"><h3>Total</h3><span id="totalLeads">0</span></div>
    <div class="card quente"><h3>Quentes</h3><span id="leadsQuentes">0</span></div>
    <div class="card medio"><h3>Médios</h3><span id="leadsMedios">0</span></div>
    <div class="card frio"><h3>Frios</h3><span id="leadsFrios">0</span></div>
  </section>

  <section class="formulario">
    <h2>Cadastrar Lead</h2>

    <form id="leadForm">
      <input type="text" id="empresa" placeholder="Nome da empresa" required>
      <input type="text" id="cidade" placeholder="Cidade" required>

      <select id="nicho" required>
        <option value="">Selecione o nicho</option>
        <option>Clínica Odontológica</option>
        <option>Fisioterapia</option>
        <option>Clínica de Estética</option>
        <option>Imobiliária</option>
        <option>Distribuidora</option>
        <option>Agropecuária</option>
      </select>

      <input type="text" id="telefone" placeholder="WhatsApp / telefone">
      <input type="url" id="site" placeholder="Site">
      <input type="url" id="instagram" placeholder="Instagram">
      <input type="url" id="googleMaps" placeholder="Google Maps">

      <select id="status">
        <option>Lead Novo</option>
        <option>Primeiro Contato</option>
        <option>Interessado</option>
        <option>Reunião</option>
        <option>Proposta</option>
        <option>Fechado</option>
        <option>Perdido</option>
      </select>

      <select id="servico">
        <option>Landing Page</option>
        <option>Site Institucional</option>
        <option>Google Business</option>
        <option>Plano Mensal</option>
        <option>Consultoria Digital</option>
      </select>

      <input type="text" id="valor" placeholder="Valor sugerido. Ex: R$ 497">

      <div class="checklist">
        <label><input type="checkbox" id="temSite"> Tem site profissional</label>
        <label><input type="checkbox" id="temWhatsapp"> WhatsApp visível</label>
        <label><input type="checkbox" id="instagramAtivo"> Instagram ativo</label>
        <label><input type="checkbox" id="googleAtualizado"> Google atualizado</label>
        <label><input type="checkbox" id="identidadeVisual"> Boa identidade visual</label>
      </div>

      <textarea id="problemas" placeholder="Problemas encontrados: sem site, Google desatualizado, Instagram parado..."></textarea>
      <textarea id="observacoes" placeholder="Observações"></textarea>

      <button type="submit">Salvar Lead</button>
    </form>
  </section>

  <section class="filtros">
    <h2>Filtrar Leads</h2>
    <input type="text" id="filtroCidade" placeholder="Filtrar por cidade">

    <select id="filtroNicho">
      <option value="">Todos os nichos</option>
      <option>Clínica Odontológica</option>
      <option>Fisioterapia</option>
      <option>Clínica de Estética</option>
      <option>Imobiliária</option>
      <option>Distribuidora</option>
      <option>Agropecuária</option>
    </select>

    <select id="filtroStatus">
      <option value="">Todos os status</option>
      <option>Lead Novo</option>
      <option>Primeiro Contato</option>
      <option>Interessado</option>
      <option>Reunião</option>
      <option>Proposta</option>
      <option>Fechado</option>
      <option>Perdido</option>
    </select>
  </section>

  <section class="lista">
    <h2>Leads Cadastrados</h2>
    <div id="listaLeads"></div>
  </section>

</main>

<script src="script.js"></script>
</body>
</html>
